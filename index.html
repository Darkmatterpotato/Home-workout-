<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Workout</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
font-family: Arial;
background:black;
color:white;
text-align:center;
padding-top:100px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<h1>Daily Workout</h1>

<button onclick="startWorkout()">Complete Workout</button>

<p>Workouts completed: <b id="count">0</b></p>

<script>

let workouts = localStorage.getItem("workouts") || 0;

document.getElementById("count").innerText = workouts;

function startWorkout(){

workouts++;

localStorage.setItem("workouts", workouts);

document.getElementById("count").innerText = workouts;

alert("Workout completed!");

}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
